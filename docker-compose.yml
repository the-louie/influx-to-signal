services:
  signal-api:
    image: bbernhard/signal-cli-rest-api:latest
    environment:
      - MODE=${SIGNAL_API_MODE:-json-rpc}
    ports:
      - "${SIGNAL_API_PORT:-8080}:8080"
    volumes:
      - ./signal-cli-config:/home/.local/share/signal-cli
    restart: unless-stopped

  publisher:
    build: .
    env_file: .env
    depends_on:
      - signal-api
    restart: unless-stopped
